services:
  # --- Application Services ---

  skinora-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skinora-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Redis__ConnectionString=${REDIS_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER:-skinora}
      - Jwt__Audience=${JWT_AUDIENCE:-skinora-client}
      - Jwt__AccessTokenExpiryMinutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      - Jwt__RefreshTokenExpiryDays=${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      - Serilog__WriteTo__1__Args__uri=${LOKI_URL:-http://skinora-loki:3100}
    depends_on:
      skinora-db:
        condition: service_healthy
      skinora-redis:
        condition: service_healthy
      skinora-loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - skinora-network

  skinora-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skinora-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://skinora-backend:5000}
    depends_on:
      skinora-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - skinora-network

  skinora-steam-sidecar:
    build:
      context: ./sidecar-steam
      dockerfile: Dockerfile
    container_name: skinora-steam-sidecar
    ports:
      - "${STEAM_SIDECAR_PORT:-5100}:5100"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_URL=${STEAM_SIDECAR_BACKEND_URL:-http://skinora-backend:5000}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - LOKI_URL=${LOKI_URL:-http://skinora-loki:3100}
    depends_on:
      skinora-backend:
        condition: service_healthy
      skinora-loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - skinora-network

  skinora-blockchain-sidecar:
    build:
      context: ./sidecar-blockchain
      dockerfile: Dockerfile
    container_name: skinora-blockchain-sidecar
    ports:
      - "${BLOCKCHAIN_SIDECAR_PORT:-5200}:5200"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_URL=${BLOCKCHAIN_SIDECAR_BACKEND_URL:-http://skinora-backend:5000}
      - TRON_NETWORK=${TRON_NETWORK:-nile}
      - TRON_FULL_NODE_URL=${TRON_FULL_NODE_URL}
      - HD_WALLET_MNEMONIC=${HD_WALLET_MNEMONIC}
      - LOKI_URL=${LOKI_URL:-http://skinora-loki:3100}
    depends_on:
      skinora-backend:
        condition: service_healthy
      skinora-loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - skinora-network

  # --- Infrastructure Services ---

  skinora-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: skinora-db
    ports:
      - "${DB_PORT:-1433}:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID:-Developer}
    volumes:
      - skinora-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - skinora-network

  skinora-redis:
    image: redis:7-alpine
    container_name: skinora-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - skinora-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - skinora-network

  # --- Observability (T08) ---

  skinora-loki:
    image: grafana/loki:3.2.1
    container_name: skinora-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - skinora-loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - skinora-network

  skinora-grafana:
    image: grafana/grafana:11.3.0
    container_name: skinora-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - skinora-grafana-data:/var/lib/grafana
    depends_on:
      skinora-loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - skinora-network

  skinora-reverse-proxy:
    image: nginx:alpine
    container_name: skinora-reverse-proxy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      skinora-backend:
        condition: service_healthy
      skinora-frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - skinora-network

volumes:
  skinora-db-data:
  skinora-redis-data:
  skinora-loki-data:
  skinora-grafana-data:

networks:
  skinora-network:
    driver: bridge
