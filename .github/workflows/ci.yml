name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

# Cancel in-progress runs of the same workflow on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Detect which areas of the repo changed so downstream jobs can skip when
  # a PR only touches docs/memory/markdown. Integration test + migration
  # dry-run + build + unit/contract test all depend on backend source —
  # running them on a pure-docs PR wastes ~25 Linux minutes with zero
  # signal (see 2026-04-19 T26 chore PR chain).
  #
  # `backend` output is true when any tracked file under backend/,
  # frontend/, sidecar-*/, or .github/workflows/ changed. A workflow edit
  # forces a full run because the workflow itself might reshape job graph.
  # ----------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'backend/**'
              - 'frontend/**'
              - 'sidecar-steam/**'
              - 'sidecar-blockchain/**'
              - '.github/workflows/**'

  # ----------------------------------------------------------------------------
  # 0. Guard — direct push detection (defense-in-depth, T11 R3)
  # Sadece push event'lerinde calisir (PR'larda skip).
  # PR squash merge commit mesajlari "(#NN)" icerdiginden otomatik PASS olur.
  # Direct push'lar (hook bypass veya hook kurulu degil) bunu tetikler.
  # [skip-guard] commit mesajinda varsa bypass edilir (acil durum).
  # Bu job FAIL olsa da push zaten gerceklesmistir — amaci: gorunur uyari.
  # ----------------------------------------------------------------------------
  guard-direct-push:
    name: 0. Guard (direct push)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for PR merge reference
        run: |
          MSG=$(git log -1 --format=%B HEAD)
          echo "Commit message: $MSG"
          echo ""

          if echo "$MSG" | grep -qE '\(#[0-9]+\)'; then
            echo "OK: commit message contains PR reference — squash merge detected."
          elif echo "$MSG" | grep -q '\[skip-guard\]'; then
            echo "::warning title=Guard Bypass::[skip-guard] override detected in commit message."
            echo "This commit was pushed directly to a protected branch without a PR."
          else
            echo "::error title=Direct Push Detected::This commit was pushed directly without a PR merge."
            echo ""
            echo "Discipline-only branch protection rejiminde tum degisiklikler"
            echo "PR + CI uzerinden gitmeli. Direct push tespit edildi."
            echo ""
            echo "Bu hata gorunurluk icindir — push zaten gerceklesti."
            echo "Bir sonraki commit'te bu durumu duzelt veya bypass log'a kaydet."
            echo ""
            echo "Bypass: commit mesajina [skip-guard] ekle (acil durum)."
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # 1. Lint  (09 §21.4 step 1)
  # ----------------------------------------------------------------------------
  lint:
    name: 1. Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: dotnet format (verify backend)
        working-directory: backend
        run: dotnet format Skinora.sln --verify-no-changes --severity error

      - name: Frontend lint
        working-directory: frontend
        run: npm ci && npm run lint

      - name: Sidecar-steam typecheck
        working-directory: sidecar-steam
        run: npm ci && npx tsc --noEmit

      - name: Sidecar-blockchain typecheck
        working-directory: sidecar-blockchain
        run: npm ci && npx tsc --noEmit

  # ----------------------------------------------------------------------------
  # 2. Build  (09 §21.4 step 2)
  # ----------------------------------------------------------------------------
  build:
    name: 2. Build
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: dotnet restore
        working-directory: backend
        run: dotnet restore Skinora.sln

      - name: dotnet build
        working-directory: backend
        run: dotnet build Skinora.sln --configuration Release --no-restore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend build
        working-directory: frontend
        run: npm ci --include=optional && npm run build

  # ----------------------------------------------------------------------------
  # 3. Unit test  (09 §21.4 step 3)
  # Filter: tests NOT in *.Integration namespace
  # ----------------------------------------------------------------------------
  unit-test:
    name: 3. Unit test
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run unit tests
        working-directory: backend
        run: |
          dotnet test Skinora.sln \
            --configuration Release \
            --filter "FullyQualifiedName!~.Integration&FullyQualifiedName!~.Contract" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/TestResults/
          retention-days: 7

  # ----------------------------------------------------------------------------
  # 4. Integration test  (09 §21.4 step 4)
  # Filter: tests in *.Integration namespace
  # TestContainers brings up SQL Server / Redis as needed.
  # ----------------------------------------------------------------------------
  integration-test:
    name: 4. Integration test
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run integration tests
        # -m:1 forces a single test-assembly process at a time. Combined
        # with the serial xunit.runner.json shared from backend/tests/,
        # only one MsSqlContainer is alive at any moment — avoids the
        # OOM exits that looked like flakes on the 7.75 GB ubuntu-latest
        # runner (see 2026-04-19 T26 validator chain).
        working-directory: backend
        run: |
          dotnet test Skinora.sln \
            --configuration Release \
            --filter "FullyQualifiedName~.Integration" \
            --logger "trx;LogFileName=integration-tests.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults \
            -m:1

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/TestResults/
          retention-days: 7

  # ----------------------------------------------------------------------------
  # 5. Contract test  (09 §21.4 step 5)
  # T11.1 — ContractTestBase smoke tests (T12). Gercek sidecar <-> backend schema
  # dogrulamalari F4 sidecar entegrasyonlari (T65, T68) icinde eklenecek.
  # ----------------------------------------------------------------------------
  contract-test:
    name: 5. Contract test
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run contract tests
        working-directory: backend
        run: |
          dotnet test Skinora.sln \
            --configuration Release \
            --filter "FullyQualifiedName~.Contract" \
            --logger "trx;LogFileName=contract-tests.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Upload contract test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-results
          path: backend/TestResults/
          retention-days: 7

  # ----------------------------------------------------------------------------
  # 6. Migration dry-run  (09 §21.4 step 6)
  # T11.1 — `dotnet ef dbcontext info` calistirarak DbContext + model validation
  # yapilir (T17-T20 entity'leri burada dogrulanir, blind spot kapaniyor).
  # Gercek `dotnet ef migrations script --dry-run` F1 T28 (initial migration)
  # sonrasi eklenecek.
  # ----------------------------------------------------------------------------
  migration-dry-run:
    name: 6. Migration dry-run
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 9.0.3

      - name: dotnet ef dbcontext info (model validation)
        working-directory: backend
        run: |
          dotnet ef dbcontext info \
            --project src/Skinora.Shared/Skinora.Shared.csproj \
            --startup-project src/Skinora.API/Skinora.API.csproj \
            --context AppDbContext

  # ----------------------------------------------------------------------------
  # 7. Docker build check  (kabul kriterleri: image build dogrulamasi)
  # Push YOK — sadece build dogrulamasi. Push isi docker-publish.yml'da.
  # ----------------------------------------------------------------------------
  docker-build-check:
    name: 7. Docker build (${{ matrix.component.name }})
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: backend,            context: backend            }
          - { name: frontend,           context: frontend           }
          - { name: sidecar-steam,      context: sidecar-steam      }
          - { name: sidecar-blockchain, context: sidecar-blockchain }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          push: false
          load: false
          cache-from: type=gha,scope=ci-${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.component.name }}

  # ----------------------------------------------------------------------------
  # CI Gate — toplu PASS kontrolu icin tek required check
  # Branch protection bu job'u required olarak isaretler.
  # ----------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    needs:
      - guard-direct-push
      - lint
      - build
      - unit-test
      - integration-test
      - contract-test
      - migration-dry-run
      - docker-build-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error title=CI Gate::One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
