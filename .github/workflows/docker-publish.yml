name: Docker Publish

# main'e merge sonrasi 4 servis image'ini ghcr.io'ya push eder.
# PR'larda calismaz (ci.yml docker-build-check zaten build dogrulamasi yapar).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: backend,            context: backend            }
          - { name: frontend,           context: frontend           }
          - { name: sidecar-steam,      context: sidecar-steam      }
          - { name: sidecar-blockchain, context: sidecar-blockchain }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.component.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=main-${{ github.run_number }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.component.name }}
